<!DOCTYPE html>
<html>
<head>
  <title>Codez AI IDE</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>
</head>
<body>
  <div class="app">
    <aside class="nav">
      <div class="nav-group">
        <div class="nav-title">New Thread</div>
        <div class="nav-item">Automations</div>
        <div class="nav-item">Skills</div>
      </div>
      <div class="nav-group">
        <div class="nav-title">Threads</div>
        <div class="nav-item active">Batao project ke bare mein</div>
        <div class="nav-item">Playground 3</div>
      </div>
      <div class="nav-group">
        <div class="nav-title">Chat History</div>
        <div id="history" class="files"></div>
      </div>
      <div class="nav-group">
        <div class="nav-title">Repos</div>
        <div id="repos" class="files"></div>
      </div>
      <div class="nav-group">
        <div class="nav-title">Repo Files</div>
        <div id="files" class="files"></div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <div class="title">
            <span class="title-main">Batao project ke bare mein</span>
            <span class="title-sub">codez-ai-main</span>
          </div>
          <div class="status" id="authStatus">Guest</div>
        </div>
        <div class="topbar-actions icon-bar">
          <button class="icon-btn" title="Explain" onclick="runAI('explain')"><i data-lucide="help-circle"></i></button>
          <button class="icon-btn" title="Fix Bug" onclick="runAI('fix')"><i data-lucide="bug"></i></button>
          <button class="icon-btn" title="Optimize" onclick="runAI('optimize')"><i data-lucide="zap"></i></button>
          <button class="icon-btn" title="Run" onclick="runCode()"><i data-lucide="play"></i></button>
          <button class="icon-btn" title="Terminal" onclick="toggleTerminal()"><i data-lucide="terminal"></i></button>
          <button class="icon-btn" title="Settings" onclick="openSettings()"><i data-lucide="settings"></i></button>
          <button class="icon-btn" title="GitHub Login" id="loginBtn" onclick="loginGithub()"><i data-lucide="log-in"></i></button>
          <button class="icon-btn" title="Google Login" id="googleBtn" onclick="loginGoogle()"><i data-lucide="mail"></i></button>
        </div>
      </header>

      <section class="unified-bar">
        <input id="actionUrl" type="text" placeholder="Paste repo URL or website URL">
        <button class="icon-btn" title="Clone Repo" onclick="cloneRepoUnified()"><i data-lucide="download"></i></button>
        <button class="icon-btn" title="Analyze URL" onclick="analyzeUrlUnified()"><i data-lucide="search"></i></button>
        <input id="commitMsg" type="text" placeholder="Commit message">
        <button class="icon-btn" title="Commit + Push" onclick="pushRepo()"><i data-lucide="upload"></i></button>
        <button class="icon-btn" title="Save File" onclick="saveFile()"><i data-lucide="save"></i></button>
        <div class="analyze-status" id="analyzeStatus">Static analyzer ready</div>
      </section>

      <section class="workbench">
        <div id="editor" class="editor"></div>
        <div class="ai">
          <div class="ai-header">
            <div class="ai-title">AI Chat</div>
            <div class="ai-tag" id="modelTag">model: deepseek</div>
          </div>
          <div class="attach-row">
            <label class="icon-btn" title="Add File">
              <i data-lucide="file-plus"></i>
              <input type="file" id="aiFile" multiple>
            </label>
            <label class="icon-btn" title="Add Folder">
              <i data-lucide="folder-plus"></i>
              <input type="file" id="aiFolder" webkitdirectory multiple>
            </label>
            <div class="attach-info" id="attachInfo">No attachments</div>
          </div>
          <div id="result" class="chat"></div>
        </div>
      </section>

      <section class="analysis">
        <div class="analysis-title">URL Analysis</div>
        <pre id="analysisResult" class="analysis-result">No analysis yet.</pre>
      </section>
    </main>
  </div>

  <div id="terminalDrawer" class="terminal-drawer" aria-hidden="true">
    <div class="terminal-head">
      <div class="terminal-title">Terminal</div>
      <button class="icon-btn" title="Close" onclick="toggleTerminal()"><i data-lucide="x"></i></button>
    </div>
    <div id="terminal" class="terminal">Terminal ready...</div>
  </div>

  <script src="app.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    if (window.lucide && lucide.createIcons) {
      lucide.createIcons({ attrs: { 'stroke-width': 1.6 } });
    }
  </script>
</body>
</html>
