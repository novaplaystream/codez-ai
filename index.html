<!DOCTYPE html>
<html>
<head>
<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
}

textarea{
width:90%;
height:400px;
background:#0f172a;
color:white;
font-size:16px;
padding:15px;
border-radius:8px;
border:1px solid #334155;
font-family:monospace;
resize:vertical;
}

button{
padding:12px 24px;
font-size:16px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

#result{
width:90%;
min-height:200px;
margin-top:20px;
background:#0f172a;
color:white;
padding:15px;
border-radius:8px;
border:1px solid #334155;
}

</style>
<title>Codez AI</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-black text-white">

<div class="max-w-4xl mx-auto p-6">

<h1 class="text-3xl font-bold text-blue-400">
Codez AI Assistant
</h1>

<textarea id="prompt" placeholder="Paste code or ask AI..." rows="20"></textarea>


<button
onclick="askAI()"
class="mt-4 bg-blue-600 px-4 py-2 rounded">

Ask AI

</button>

<pre
id="result"
class="bg-gray-900 p-4 mt-6 rounded">
</pre>

</div>

<script src="app.js"></script>

</body>
</html>
