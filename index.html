<!DOCTYPE html>
<html>
<head>

<title>Codez AI IDE</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>

</head>

<body>

<div class="topbar">

<button onclick="runAI('explain')">Explain</button>
<button onclick="runAI('fix')">Fix Bug</button>
<button onclick="runAI('optimize')">Optimize</button>
<button onclick="runCode()">Run</button>

<input type="file" webkitdirectory onchange="loadProject(event)">

</div>

<div class="layout">

<div class="sidebar" id="files">
<b>Project Files</b>
</div>

<div id="editor" class="editor"></div>

<div class="ai">

<h3>AI Chat</h3>

<div id="result" class="chat"></div>

</div>

</div>

<div id="terminal" class="terminal">
Terminal ready...
</div>

<script src="app.js"></script>

</body>
</html>
