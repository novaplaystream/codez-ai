<!DOCTYPE html>
<html>
<head>
<title>Codez AI</title>

<style>

body{
margin:0;
background:#0b0f19;
color:white;
font-family:Arial;
}

header{
padding:15px 30px;
background:#111827;
font-size:22px;
font-weight:bold;
}

.container{
display:flex;
height:90vh;
}

.editor{
flex:1;
padding:20px;
}

textarea{
width:100%;
height:70vh;
background:#0f172a;
color:#e2e8f0;
border:1px solid #334155;
border-radius:8px;
padding:15px;
font-family:monospace;
font-size:15px;
}

.controls{
margin-top:10px;
}

button{
background:#2563eb;
border:none;
padding:10px 18px;
margin:5px;
border-radius:6px;
color:white;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.ai-panel{
width:35%;
background:#020617;
padding:20px;
border-left:1px solid #1e293b;
}

.response{
background:#0f172a;
padding:15px;
border-radius:8px;
height:70vh;
overflow:auto;
font-family:monospace;
}

</style>

</head>

<body>

<header>⚡ Codez AI — Coding Assistant</header>

<div class="container">

<div class="editor">

<textarea id="prompt" placeholder="Paste code or ask AI..."></textarea>

<div class="controls">

<button onclick="askAI('explain')">Explain</button>
<button onclick="askAI('fix')">Fix Bug</button>
<button onclick="askAI('optimize')">Optimize</button>
<button onclick="askAI('generate')">Generate</button>

</div>

</div>

<div class="ai-panel">

<h3>AI Response</h3>

<div id="result" class="response"></div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
