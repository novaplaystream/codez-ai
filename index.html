<!DOCTYPE html>
<html>
<head>

<title>Codez AI IDE</title>

<style>

body{
margin:0;
background:#0b0f19;
color:white;
font-family:Arial;
}

.topbar{
height:45px;
background:#111827;
display:flex;
align-items:center;
padding:0 15px;
gap:8px;
border-bottom:1px solid #1e293b;
}

.topbar button{
background:#2563eb;
border:none;
padding:6px 12px;
border-radius:5px;
color:white;
cursor:pointer;
}

.layout{
display:flex;
height:calc(100vh - 45px);
}

.sidebar{
width:220px;
background:#020617;
border-right:1px solid #1e293b;
padding:10px;
overflow:auto;
}

.editor{
flex:1;
}

.ai{
width:340px;
background:#020617;
border-left:1px solid #1e293b;
padding:15px;
}

.chat{
height:70%;
overflow:auto;
background:#0f172a;
padding:10px;
border-radius:6px;
font-family:monospace;
}

.terminal{
height:120px;
background:#020617;
border-top:1px solid #1e293b;
padding:10px;
font-family:monospace;
overflow:auto;
}

input{
background:#0f172a;
border:1px solid #334155;
color:white;
padding:4px;
border-radius:4px;
}

.file{
cursor:pointer;
color:#94a3b8;
margin-top:5px;
}

</style>

<script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>

</head>

<body>

<div class="topbar">

<button onclick="ai('explain')">Explain</button>
<button onclick="ai('fix')">Fix Bug</button>
<button onclick="ai('optimize')">Optimize</button>
<button onclick="ai('generate')">Generate</button>
<button onclick="detectLanguage()">Detect Language</button>

<input type="file" webkitdirectory onchange="loadProject(event)">
<button onclick="githubPull()">Git Pull</button>
<button onclick="githubPush()">Git Push</button>

</div>

<div class="layout">

<div class="sidebar" id="files">

<b>Project Files</b>

</div>

<div id="editor" class="editor"></div>

<div class="ai">

<h3>AI Chat</h3>

<div id="result" class="chat"></div>

</div>

</div>

<div class="terminal" id="terminal">

Terminal ready...

</div>

<script>

require.config({paths:{vs:"https://unpkg.com/monaco-editor@0.45.0/min/vs"}});

require(["vs/editor/editor.main"],function(){

window.editor = monaco.editor.create(
document.getElementById("editor"),
{
value:"",
language:"javascript",
theme:"vs-dark"
}
);

});

function loadProject(event){

const files=event.target.files;

const sidebar=document.getElementById("files");

sidebar.innerHTML="<b>Project Files</b>";

for(let file of files){

const div=document.createElement("div");

div.textContent=file.webkitRelativePath;

div.className="file";

div.onclick=()=>openFile(file);

sidebar.appendChild(div);

}

}

function openFile(file){

const reader=new FileReader();

reader.onload=function(){

editor.setValue(reader.result);

};

reader.readAsText(file);

}

async function ai(mode){

const code=editor.getValue();

const prompt=mode+" this code and fix problems if any:\n\n"+code;

const response=await fetch(
"https://codez-ai-production.up.railway.app/ai",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({prompt})
}
);

const data=await response.json();

document.getElementById("result").textContent=data.result;

}

function detectLanguage(){

const code=editor.getValue();

let lang="Unknown";

if(code.includes("def ")) lang="Python";

if(code.includes("console.log")) lang="JavaScript";

if(code.includes("#include")) lang="C/C++";

document.getElementById("result").textContent="Detected language: "+lang;

}

async function githubPull(){

document.getElementById("terminal").textContent+="\nGit Pull executed";

}

async function githubPush(){

document.getElementById("terminal").textContent+="\nGit Push executed";

}

</script>

</body>
</html>
