<!DOCTYPE html>
<html>
<head>

<title>Codez AI</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-black text-white">

<div class="max-w-4xl mx-auto p-6">

<h1 class="text-3xl font-bold text-blue-400">
Codez AI Assistant
</h1>

<textarea id="prompt" placeholder="Paste code or ask AI..." rows="20"></textarea>


<button
onclick="askAI()"
class="mt-4 bg-blue-600 px-4 py-2 rounded">

Ask AI

</button>

<pre
id="result"
class="bg-gray-900 p-4 mt-6 rounded">
</pre>

</div>

<script src="app.js"></script>

</body>
</html>
