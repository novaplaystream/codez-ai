<!DOCTYPE html>
<html>
<head>
<title>Codez AI IDE</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>
</head>
<body>
<div id="bootError" class="boot-error" hidden></div>
<div class="app">
  <aside class="nav">
    <div class="nav-group">
      <div class="nav-title">New thread</div>
      <div class="nav-item">Automations</div>
      <div class="nav-item">Skills</div>
    </div>
    <div class="nav-group">
      <div class="nav-title">Threads</div>
      <div class="nav-item active">Batao project ke bare mein</div>
      <div class="nav-item">Playground 3</div>
    </div>
    <div class="nav-group">
      <div class="nav-title">Chat History</div>
      <div id="history" class="files"></div>
    </div>
    <div class="nav-group">
      <div class="nav-title">Repos</div>
      <div id="repos" class="files"></div>
    </div>
    <div class="nav-group">
      <div class="nav-title">Repo Files</div>
      <div id="files" class="files"></div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <div class="title">
          <span class="title-main">Batao project ke bare mein</span>
          <span class="title-sub">codez-ai-main</span>
        </div>
        <div class="status" id="authStatus">Guest</div>
      </div>
      <div class="topbar-actions">
        <button class="pill" onclick="runAI('explain')">Explain</button>
        <button class="pill" onclick="runAI('fix')">Fix Bug</button>
        <button class="pill" onclick="runAI('optimize')">Optimize</button>
        <button class="pill ghost" onclick="runCode()">Run</button>
        <button class="pill" id="loginBtn" onclick="loginGithub()">GitHub Login</button>
        <button class="pill" id="googleBtn" onclick="loginGoogle()">Google Login</button>
      </div>
    </header>

    <section class="repo-bar">
      <input id="repoUrl" type="text" placeholder="https://github.com/user/repo.git">
      <button class="pill" onclick="cloneRepo()">Clone</button>
      <button class="pill" onclick="pullRepo()">Pull</button>
      <input id="commitMsg" type="text" placeholder="Commit message">
      <button class="pill" onclick="pushRepo()">Commit + Push</button>
      <button class="pill ghost" onclick="saveFile()">Save File</button>
    </section>

    <section class="analyze-bar">
      <input id="analyzeUrl" type="text" placeholder="https://example.com">
      <button class="pill" onclick="analyzeUrl()">Analyze URL</button>
      <div class="analyze-status" id="analyzeStatus">Static analyzer ready</div>
    </section>

    <section class="log-pane">
      <div class="log-title">Run Log</div>
      <div id="log" class="log-feed"></div>
    </section>

    <section class="workbench">
      <div id="editor" class="editor"></div>
      <div class="ai">
        <div class="ai-header">
          <h3>AI Chat</h3>
          <div class="ai-tag" id="modelTag">model: deepseek</div>
        </div>
        <div class="attach-row">
          <label class="file-btn small">
            Add File
            <input type="file" id="aiFile" multiple>
          </label>
          <label class="file-btn small">
            Add Folder
            <input type="file" id="aiFolder" webkitdirectory multiple>
          </label>
          <div class="attach-info" id="attachInfo">No attachments</div>
        </div>
        <div id="result" class="chat"></div>
      </div>
    </section>

    <section class="analysis">
      <div class="analysis-title">URL Analysis</div>
      <pre id="analysisResult" class="analysis-result">No analysis yet.</pre>
    </section>

    <div id="terminal" class="terminal">Terminal ready...</div>

    <section class="composer">
      <textarea id="userNote" placeholder="Ask for follow-up changes..."></textarea>
      <div class="composer-actions">
        <button class="pill" onclick="runAI('explain')">Send</button>
      </div>
    </section>
  </main>
</div>

<script>
  (function(){
    const el = document.getElementById("bootError");
    function show(msg){
      if(!el) return;
      el.hidden = false;
      el.textContent = msg;
    }
    window.addEventListener("error", function(e){
      if(e && e.target && e.target.tagName === "SCRIPT"){
        show("Script failed to load: " + (e.target.src || "unknown"));
      }else{
        show("App error: " + (e.message || e.type));
      }
    });
  })();
</script>
<script src="app.js"></script>
</body>
</html>
