<!DOCTYPE html>
<html>
<head>

<title>Codez AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background:#0d1117;
color:white;
font-family:monospace;
}
</style>

</head>

<body>

<div class="max-w-4xl mx-auto p-6">

<h1 class="text-3xl font-bold text-blue-400 mb-6">
Codez AI
</h1>

<textarea id="code"
class="w-full h-40 bg-gray-900 p-4 rounded"
placeholder="Paste code here..."></textarea>

<div class="flex gap-3 mt-4">

<button onclick="explain()"
class="bg-blue-600 px-4 py-2 rounded">
Explain
</button>

<button onclick="debug()"
class="bg-red-600 px-4 py-2 rounded">
Debug
</button>

<button onclick="optimize()"
class="bg-green-600 px-4 py-2 rounded">
Optimize
</button>

</div>

<pre id="output"
class="bg-black p-4 mt-6 rounded"></pre>

</div>

<script>

function explain(){
let code=document.getElementById("code").value

document.getElementById("output").textContent=
"AI Explanation:\\n\\nYour code was analyzed."
}

function debug(){
document.getElementById("output").textContent=
"No bugs detected."
}

function optimize(){
document.getElementById("output").textContent=
"Optimization suggestion generated."
}

</script>

</body>
</html>
