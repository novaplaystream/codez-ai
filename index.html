<!DOCTYPE html>
<html>
<head>
  <title>Codez AI IDE</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>
</head>
<body>
  <div class="app">
    <aside class="nav">
      <div class="nav-group">
        <div class="nav-title">New Thread</div>
        <div class="nav-item">Automations</div>
        <div class="nav-item">Skills</div>
      </div>
      <div class="nav-group">
        <div class="nav-title">Threads</div>
        <div class="nav-item active">Batao project ke bare mein</div>
        <div class="nav-item">Playground 3</div>
      </div>
      <div class="nav-group">
        <div class="nav-title">Chat History</div>
        <div id="history" class="files"></div>
      </div>
      <div class="nav-group">
        <div class="nav-title">Repos</div>
        <div id="repos" class="files"></div>
      </div>
      <div class="nav-group">
        <div class="nav-title">Repo Files</div>
        <div id="files" class="files"></div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <div class="title">
            <span class="title-main">Batao project ke bare mein</span>
            <span class="title-sub">codez-ai-main</span>
          </div>
          <div class="status" id="authStatus">Guest</div>
        </div>
        <div class="topbar-actions icon-bar">
          <button class="icon-btn" title="Explain" onclick="runAI('explain')"><img alt="" src="https://tabler-icons.io/i/help.svg"></button>
          <button class="icon-btn" title="Fix Bug" onclick="runAI('fix')"><img alt="" src="https://tabler-icons.io/i/bug.svg"></button>
          <button class="icon-btn" title="Optimize" onclick="runAI('optimize')"><img alt="" src="https://tabler-icons.io/i/bolt.svg"></button>
          <button class="icon-btn" title="Run" onclick="runCode()"><img alt="" src="https://tabler-icons.io/i/player-play.svg"></button>
          <button class="icon-btn" title="Terminal" onclick="toggleTerminal()"><img alt="" src="https://tabler-icons.io/i/terminal-2.svg"></button>
          <button class="icon-btn" title="Settings" onclick="openSettings()"><img alt="" src="https://tabler-icons.io/i/settings.svg"></button>
          <button class="icon-btn" title="GitHub Login" id="loginBtn" onclick="loginGithub()"><img alt="" src="https://tabler-icons.io/i/brand-github.svg"></button>
          <button class="icon-btn" title="Google Login" id="googleBtn" onclick="loginGoogle()"><img alt="" src="https://tabler-icons.io/i/brand-google.svg"></button>
        </div>
      </header>

      <section class="unified-bar">
        <input id="actionUrl" type="text" placeholder="Paste repo URL or website URL">
        <button class="icon-btn" title="Clone Repo" onclick="cloneRepoUnified()"><img alt="" src="https://tabler-icons.io/i/git-clone.svg"></button>
        <button class="icon-btn" title="Analyze URL" onclick="analyzeUrlUnified()"><img alt="" src="https://tabler-icons.io/i/search.svg"></button>
        <input id="commitMsg" type="text" placeholder="Commit message">
        <button class="icon-btn" title="Commit + Push" onclick="pushRepo()"><img alt="" src="https://tabler-icons.io/i/cloud-upload.svg"></button>
        <button class="icon-btn" title="Save File" onclick="saveFile()"><img alt="" src="https://tabler-icons.io/i/device-floppy.svg"></button>
        <div class="analyze-status" id="analyzeStatus">Static analyzer ready</div>
      </section>

      <section class="workbench">
        <div id="editor" class="editor"></div>
        <div class="ai">
          <div class="ai-header">
            <div class="ai-title">AI Chat</div>
            <div class="ai-tag" id="modelTag">model: deepseek</div>
          </div>
          <div class="attach-row">
            <label class="icon-btn" title="Add File">
              <img alt="" src="https://tabler-icons.io/i/file-plus.svg">
              <input type="file" id="aiFile" multiple>
            </label>
            <label class="icon-btn" title="Add Folder">
              <img alt="" src="https://tabler-icons.io/i/folder-plus.svg">
              <input type="file" id="aiFolder" webkitdirectory multiple>
            </label>
            <div class="attach-info" id="attachInfo">No attachments</div>
          </div>
          <div id="result" class="chat"></div>
        </div>
      </section>

      <section class="analysis">
        <div class="analysis-title">URL Analysis</div>
        <pre id="analysisResult" class="analysis-result">No analysis yet.</pre>
      </section>
    </main>
  </div>

  <div id="terminalDrawer" class="terminal-drawer" aria-hidden="true">
    <div class="terminal-head">
      <div class="terminal-title">Terminal</div>
      <button class="icon-btn" title="Close" onclick="toggleTerminal()"><img alt="" src="https://tabler-icons.io/i/x.svg"></button>
    </div>
    <div id="terminal" class="terminal">Terminal ready...</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
