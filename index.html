<!DOCTYPE html>
<html>
<head>

<title>Codez AI IDE</title>

<style>

body{
margin:0;
background:#0b0f19;
color:white;
font-family:Arial;
}

.topbar{
height:50px;
background:#111827;
display:flex;
align-items:center;
padding:0 20px;
}

.topbar button{
margin-right:10px;
background:#2563eb;
border:none;
padding:8px 15px;
color:white;
border-radius:5px;
cursor:pointer;
}

.layout{
display:flex;
height:calc(100vh - 50px);
}

.editor{
flex:2;
}

.ai{
flex:1;
background:#020617;
padding:15px;
border-left:1px solid #1e293b;
}

.response{
height:90%;
overflow:auto;
background:#0f172a;
padding:10px;
border-radius:6px;
}

</style>

<script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>

</head>

<body>

<div class="topbar">

<button onclick="ai('explain')">Explain</button>
<button onclick="ai('fix')">Fix Bug</button>
<button onclick="ai('optimize')">Optimize</button>
<button onclick="ai('generate')">Generate</button>

</div>

<div class="layout">

<div id="editor" class="editor"></div>

<div class="ai">

<h3>AI Output</h3>

<div id="result" class="response"></div>

</div>

</div>

<script>

require.config({paths:{vs:"https://unpkg.com/monaco-editor@0.45.0/min/vs"}});

require(["vs/editor/editor.main"],function(){

window.editor = monaco.editor.create(
document.getElementById("editor"),
{
value:"",
language:"javascript",
theme:"vs-dark"
}
);

});

async function ai(mode){

const code = editor.getValue();

const prompt = mode + " this code:\n\n" + code;

const response = await fetch(
"https://codez-ai-production.up.railway.app/ai",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({prompt})
}
);

const data = await response.json();

document.getElementById("result").textContent =
data.result;

}

</script>

</body>
</html>
