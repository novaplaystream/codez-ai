<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="backend-url" content="https://codez-ai-production.up.railway.app" />
  <title>Codez AI - Codex Style</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-okaidia.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>
</head>
<body>
  <svg class="icon-sprite" aria-hidden="true">
    <symbol id="i-newthread" viewBox="0 0 24 24">
      <path d="M12 5v14M5 12h14"></path>
    </symbol>
    <symbol id="i-wand" viewBox="0 0 24 24">
      <path d="M5 19l14-14M7 7l2 2M12 4l2 2M4 12l2 2M16 6l2 2M6 16l2 2"></path>
    </symbol>
    <symbol id="i-book" viewBox="0 0 24 24">
      <path d="M4 5h11a3 3 0 0 1 3 3v11H7a3 3 0 0 0-3 3V5z"></path>
      <path d="M7 5v14"></path>
    </symbol>
    <symbol id="i-bug" viewBox="0 0 24 24">
      <path d="M9 9h6v8a3 3 0 0 1-6 0V9z"></path>
      <path d="M10 4h4l1 2H9l1-2z"></path>
      <path d="M4 13h4M16 13h4M6 7l2 2M18 7l-2 2M6 19l2-2M18 19l-2-2"></path>
    </symbol>
    <symbol id="i-zap" viewBox="0 0 24 24">
      <path d="M13 2L3 14h7l-1 8 10-12h-7l1-8z"></path>
    </symbol>
    <symbol id="i-download" viewBox="0 0 24 24">
      <path d="M12 3v12M7 10l5 5 5-5M4 21h16"></path>
    </symbol>
    <symbol id="i-commit" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="3"></circle>
      <path d="M3 12h6M15 12h6"></path>
    </symbol>
    <symbol id="i-upload" viewBox="0 0 24 24">
      <path d="M12 21V9M8 13l4-4 4 4M4 3h16"></path>
    </symbol>
    <symbol id="i-file-plus" viewBox="0 0 24 24">
      <path d="M14 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"></path>
      <path d="M14 2v6h6"></path>
      <path d="M12 12v6M9 15h6"></path>
    </symbol>
    <symbol id="i-folder" viewBox="0 0 24 24">
      <path d="M3 7a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"></path>
    </symbol>
    <symbol id="i-play" viewBox="0 0 24 24">
      <path d="M8 5l11 7-11 7z"></path>
    </symbol>
    <symbol id="i-login" viewBox="0 0 24 24">
      <path d="M10 17l5-5-5-5"></path>
      <path d="M15 12H3"></path>
      <path d="M21 3h-6a2 2 0 0 0-2 2v4"></path>
      <path d="M13 15v4a2 2 0 0 0 2 2h6"></path>
    </symbol>
    <symbol id="i-github" viewBox="0 0 24 24">
      <path fill="currentColor" d="M12 0.6a11.4 11.4 0 0 0-3.6 22.2c.6.1.8-.2.8-.6v-2.2c-3.2.7-3.9-1.4-3.9-1.4-.5-1.2-1.3-1.6-1.3-1.6-1-.7.1-.7.1-.7 1.1.1 1.7 1.1 1.7 1.1 1 .1 1.7.7 2.2 1.2.2-.8.6-1.3 1-1.6-2.6-.3-5.4-1.3-5.4-5.9 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.6.1-3.3 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0C17.6 4.8 18.6 5 18.6 5c.6 1.7.2 3 .1 3.3.8.8 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.4 5.9.6.5 1.2 1.4 1.2 2.9v4.1c0 .3.2.7.8.6A11.4 11.4 0 0 0 12 0.6z"></path>
    </symbol>
    <symbol id="i-google" viewBox="0 0 24 24">
      <path fill="#EA4335" d="M12 10.2v3.6h5.1c-.2 1.1-1.3 3.3-5.1 3.3a5.7 5.7 0 0 1 0-11.4c2 0 3.3.9 4.1 1.6l2.8-2.7C17.2 3.1 14.9 2 12 2 6.9 2 2.8 6.1 2.8 11.2S6.9 20.4 12 20.4c6.9 0 8.6-4.8 8.6-7.3 0-.5-.1-1-.1-1.4H12z"></path>
      <path fill="#4285F4" d="M21.5 12.1c0-.6-.1-1.1-.2-1.6H12v3.6h5.1c-.3 1.5-1.7 3.4-5.1 3.4-3.1 0-5.7-2.6-5.7-5.8S8.9 6 12 6c1.8 0 3 .8 3.7 1.5l2.5-2.4C17 3.7 14.7 2.6 12 2.6 6.9 2.6 2.8 6.7 2.8 11.8S6.9 21 12 21c6.2 0 9.5-4.3 9.5-8.9z"></path>
      <path fill="#FBBC05" d="M5.2 14.1A5.8 5.8 0 0 1 5.2 9.5l-2.9-2.2A9.2 9.2 0 0 0 2.3 16z"></path>
      <path fill="#34A853" d="M12 21a9.1 9.1 0 0 0 6.3-2.3l-2.9-2.2c-.8.6-1.9 1-3.4 1a5.7 5.7 0 0 1-5.4-4l-2.9 2.2A9.1 9.1 0 0 0 12 21z"></path>
    </symbol>
  </svg>

  <div class="app">
    <!-- Left Sidebar -->
    <nav class="nav">
      <div class="nav-top">
        <button class="nav-link icon-only" onclick="startNewThread()" aria-label="New Thread" data-label>
          <svg><use href="#i-newthread"></use></svg>
          <span class="btn-label">New Thread</span>
        </button>
      </div>

      <div class="nav-section">
        <div class="nav-section-title">Project</div>
        <div class="project-card">
          <button id="projectFolderBtn" class="nav-link icon-only" aria-label="Open Project Folder" data-label>
            <svg><use href="#i-folder"></use></svg>
            <span class="btn-label">Open Folder</span>
          </button>
          <label class="nav-link icon-only" for="projectFolder" aria-label="Add Project Files (Read-only)" data-label>
            <svg><use href="#i-file-plus"></use></svg>
            <span class="btn-label">Add Files</span>
          </label>
          <input type="file" id="projectFolder" class="hidden-input" multiple />
          <div class="project-info" id="projectInfo">No project added</div>
        </div>
      </div>

      <div class="nav-section">
        <div class="nav-section-title">Models</div>
        <div class="model-card">
          <button class="nav-link icon-only" onclick="refreshModels()" aria-label="Refresh Models" data-label>
            <svg><use href="#i-download"></use></svg>
            <span class="btn-label">Refresh</span>
          </button>
          <select id="modelSelect" class="model-select" aria-label="Select Model"></select>
          <div class="model-note">Free tier availability depends on your Groq account limits.</div>
        </div>
      </div>

      <div class="nav-section">
        <div class="nav-section-title">Threads</div>
        <div class="thread-group" id="threadGroup"></div>
      </div>

      <div class="nav-section">
        <div class="nav-section-title">Changes</div>
        <div class="commit-card" id="pendingCommitCard">
          <div class="commit-info" id="pendingCommitInfo">No pending changes</div>
          <input id="pendingCommitMsg" type="text" placeholder="Commit message" />
          <div class="commit-actions">
            <button class="nav-link icon-only" id="prepareCommitBtn" aria-label="Prepare Commit" data-label>
              <svg><use href="#i-commit"></use></svg>
              <span class="btn-label">Prepare Commit</span>
            </button>
            <button class="nav-link icon-only" id="preparePushBtn" aria-label="Prepare Push" data-label>
              <svg><use href="#i-upload"></use></svg>
              <span class="btn-label">Prepare Push</span>
            </button>
          </div>
        </div>
      </div>

      <div class="nav-footer">
        <div class="status" id="authStatus">Guest</div>
        <button id="loginBtn" class="nav-link icon-only" aria-label="GitHub Login" data-label>
          <svg class="brand-icon"><use href="#i-github"></use></svg>
          <span class="btn-label">GitHub Login</span>
        </button>
        <button id="googleLoginBtn" class="nav-link icon-only" aria-label="Google Login" data-label>
          <svg class="brand-icon multicolor"><use href="#i-google"></use></svg>
          <span class="btn-label">Google Login</span>
        </button>
      </div>
    </nav>

    <!-- Main Area -->
    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <div class="title">
            <div class="title-main">Codez AI</div>
            <div class="title-sub">Your AI coding partner</div>
          </div>
          <div class="status" id="modelTag">model: llama-3.3-70b</div>
        </div>

        <div class="topbar-actions">
          <button class="icon-btn icon-only" title="Generate" aria-label="Generate" onclick="runAI('generate')" data-label>
            <svg><use href="#i-wand"></use></svg>
            <span class="btn-label">Generate</span>
          </button>
          <button class="icon-btn icon-only" title="Explain" aria-label="Explain" onclick="runAI('explain')" data-label>
            <svg><use href="#i-book"></use></svg>
            <span class="btn-label">Explain</span>
          </button>
          <button class="icon-btn icon-only" title="Debug" aria-label="Debug" onclick="runAI('debug')" data-label>
            <svg><use href="#i-bug"></use></svg>
            <span class="btn-label">Debug</span>
          </button>
          <button class="icon-btn icon-only" title="Optimize" aria-label="Optimize" onclick="runAI('optimize')" data-label>
            <svg><use href="#i-zap"></use></svg>
            <span class="btn-label">Optimize</span>
          </button>
        </div>
      </header>

      <section class="unified-bar">
        <input id="actionUrl" type="text" placeholder="Paste repo URL or website URL" />
        <button class="icon-btn icon-only" onclick="cloneRepoUnified()" aria-label="Clone" data-label>
          <svg><use href="#i-download"></use></svg>
          <span class="btn-label">Clone</span>
        </button>
        <input id="commitMsg" type="text" placeholder="Commit message" />
        <button class="icon-btn icon-only" onclick="pushRepo()" aria-label="Commit and Push" data-label>
          <svg><use href="#i-commit"></use></svg>
          <span class="btn-label">Commit &amp; Push</span>
        </button>
      </section>

      <section class="workbench editor-hidden">
        <div id="editor" class="editor hidden"></div>

        <div class="ai">
          <div class="attach-row">
            <label class="icon-btn" for="aiFile"><svg><use href="#i-file-plus"></use></svg></label>
            <input type="file" id="aiFile" multiple class="hidden-input" />
            <div class="attach-info" id="attachInfo">No attachments</div>
            <div class="ai-tag">Groq Powered</div>
          </div>

          <div id="result" class="chat">
            <div id="chatLog" class="chat-log"></div>
          </div>

          <div class="chat-input">
            <label class="icon-btn icon-only" for="chatFile" aria-label="Attach File" data-label>
              <svg><use href="#i-file-plus"></use></svg>
              <span class="btn-label">File</span>
            </label>
            <input type="file" id="chatFile" class="hidden-input" multiple />

            <label class="icon-btn icon-only" for="chatFolder" aria-label="Attach Folder" data-label>
              <svg><use href="#i-folder"></use></svg>
              <span class="btn-label">Folder</span>
            </label>
            <input type="file" id="chatFolder" class="hidden-input" webkitdirectory directory multiple />

            <input
              id="chatInput"
              type="text"
              placeholder="Ask anything - code generate karo, explain karo, fix karo..."
            />
            <button
              class="chat-send"
              onclick="sendChatMessage()"
            >
              <svg aria-hidden="true"><use href="#i-play"></use></svg>
            </button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
